# GitHub Actions 配置说明

此项目使用 AI Code Review Bot 自动审查 PR。

## 配置步骤

### 1. 设置 Repository Secrets

进入仓库 Settings → Secrets and variables → Actions，添加以下 secrets：

| Secret Name | 说明 | 示例 |
|-------------|------|------|
| `LLM_API_KEY` | LLM API 密钥 | `sk-xxx` 或 DeepSeek API Key |
| `LLM_API_BASE` | API 基础 URL（可选） | `https://api.deepseek.com/v1` |
| `LLM_MODEL` | 模型名称（可选） | `deepseek-chat` 或 `gpt-4o` |

### 2. 支持的 LLM 提供商

- **OpenAI**: `LLM_API_BASE` 留空，`LLM_MODEL=gpt-4o`
- **DeepSeek**: `LLM_API_BASE=https://api.deepseek.com/v1`, `LLM_MODEL=deepseek-chat`
- **其他兼容 API**: 设置对应的 base URL 和 model

### 3. 工作流程

1. 创建或更新 PR 时自动触发
2. AI 根据 dev-style 规范审查代码
3. 审查结果作为评论发布到 PR

## 手动触发

也可以在 Actions 页面手动触发审查。

## 成本估算

- 每次 PR 审查约消耗 1000-5000 tokens（取决于 diff 大小）
- 使用 DeepSeek 等低成本模型更经济

